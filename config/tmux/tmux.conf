####### TMUX CONFIGURATION #######

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'laktak/extrakto'

# Plugin settings
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @thumbs-key Space
set -g @thumbs-command 'tmux set-buffer -w -- {} && tmux display-message "Copied: $(printf %.200s {} | sed s/%/%%/g)"'
set -g @thumbs-upcase-command 'tmux set-buffer -w -- {} && tmux paste-buffer && tmux display-message "Copied and pasted: $(printf %.200s {} | sed s/%/%%/g)"'
set -g @extrakto_key 'e'
set -g @extrakto_clip_tool_run 'tmux_osc52'
set -g @extrakto_fzf_unset_default_opts 'true'
set -g @extrakto_open_tool 'false'
set -g @extrakto_editor_tool 'false'

# Catppuccin settings
set -g @catppuccin_flavor 'macchiato' # latte, frappe, macchiato or mocha
set -g @catppuccin_pane_status_enabled "yes"
set -g @catppuccin_pane_border_status "top"
set -g pane-border-status top
set -g @catppuccin_pane_default_text "##{?##{@pane_label},##{?##{@pane_prefix},##{@pane_prefix}: ##{@pane_label},##{@pane_label}},##{?##{@pane_prefix},##{@pane_prefix},}}"

# Catppuccin status bar
# Host module: short hostname + primary LAN IP (first `hostname -I` field).
set -g @catppuccin_host_text " #h  #(hostname -I | awk '{print $1}')"
set -g @catppuccin_date_time_text " #(TZ=America/Los_Angeles date +'%%Y-%%m-%%d %%H:%%M')"
set -g @catppuccin_cpu_text " #(~/.tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh)"
set -g @catppuccin_ram_icon "󰍛 "
set -g @catppuccin_ram_text " #(~/.tmux/plugins/tmux-cpu/scripts/ram_percentage.sh)"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g status-interval 5
set -g status 2
set -g status-justify centre
set -g status-left-length 40
set -g status-right-length 100
# Row 1: windows only (centered)
set -g status-left ""
set -g status-right ""
# Row 2: session (left) + directory + host + cpu + ram + datetime (right)
set -g 'status-format[1]' '#{E:@catppuccin_status_session}#[align=right]#{E:@catppuccin_status_directory}#{E:@catppuccin_status_host}#{E:@catppuccin_status_cpu}#{E:@catppuccin_status_ram}#{E:@catppuccin_status_date_time}'

####### terminal settings
#set -g default-terminal "xterm-256color"
set-option -g default-shell /bin/zsh

# Set the default terminal terminfo
set -g default-terminal "tmux-256color"

# True colour support
set -as terminal-overrides ",xterm*:Tc"

# Sync tmux paste buffer to system clipboard via OSC 52
set -g set-clipboard on
set -as terminal-features ',*:clipboard'

# bind C-Space to send-prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Shift-Enter → newline (Ctrl-J / LF) instead of executing command
bind -n S-Enter send-keys C-j

# Copy mode overrides (emacs mode, but Ctrl-Space is our prefix)
bind -T copy-mode v send-keys -X begin-selection
bind -T copy-mode y send-keys -X copy-selection-and-cancel

# mouse scroll settings
set -g mouse on
# sane scrolling:
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e; send-keys -M'"

# Start windows and panes at 1, not 0 (prefix+0 → window 10)
set -g base-index 1
bind 0 select-window -t :10
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g automatic-rename off

# Arrow-key modifier ideology (all no-prefix):
#   no Alt  = navigate/select focus  -> Shift = windows, Ctrl+Shift = panes
#   Alt set = grab & manipulate       -> Alt+Shift = resize pane, Ctrl+Alt+Shift = swap window
# Bare Alt+arrow and bare Ctrl+arrow are intentionally left unbound:
#   Alt+arrow  -> reserved for shell word-jump (terminal sends it to zsh)
#   Ctrl+arrow -> reserved for macOS Space/desktop switching
# Explicit unbind so a `source-file` reload of a server that had the old
# Alt+arrow pane-select bindings actually drops them (source-file only adds).
unbind -n M-Left
unbind -n M-Right
unbind -n M-Up
unbind -n M-Down

# Shift + arrow: switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Ctrl+Shift + arrow: select pane
bind -n C-S-Left  select-pane -L
bind -n C-S-Right select-pane -R
bind -n C-S-Up    select-pane -U
bind -n C-S-Down  select-pane -D

# General handling
set -g xterm-keys on
set -s focus-events on
set -s extended-keys on
set -g detach-on-destroy off

# Popup pane for temp work
bind p display-popup -w 50% -h 40% -d "#{pane_current_path}" -E

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# Split windows with current path (| horizontal, - vertical)
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Alt+Shift + arrow: resize pane by 5
bind -n M-S-Left  resize-pane -L 5
bind -n M-S-Right resize-pane -R 5
bind -n M-S-Up    resize-pane -U 5
bind -n M-S-Down  resize-pane -D 5

# Browser-style window management
bind t new-window -c "#{pane_current_path}"
bind w kill-window
bind a choose-tree -w

# Ctrl+Alt+Shift + arrow: swap window (move it left/right in the window list)
bind -n C-M-S-Left { swap-window -t -1; previous-window }
bind -n C-M-S-Right { swap-window -t +1; next-window }

####### TMUX PLUGIN MANAGER #######
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
